<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)" />
  <!-- Mountains -->
  <polygon points="0,350 150,150 300,350" fill="#2d6a2d" />
  <polygon points="150,350 320,120 490,350" fill="#228B22" />
  <polygon points="350,350 520,140 700,350" fill="#2d6a2d" />
  <polygon points="500,350 680,160 800,280 800,350" fill="#228B22" />
  <!-- Snow caps -->
  <polygon points="150,150 130,200 170,200" fill="white" />
  <polygon points="320,120 300,170 340,170" fill="white" />
  <polygon points="520,140 500,195 540,195" fill="white" />
  <!-- Ground -->
  <rect y="350" width="800" height="150" fill="#3a7a3a" />
  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#FFD700" opacity="0.9" />
  <!-- Clouds -->
  <ellipse cx="200" cy="60" rx="80" ry="30" fill="white" opacity="0.8" />
  <ellipse cx="260" cy="55" rx="60" ry="25" fill="white" opacity="0.8" />
  <ellipse cx="140" cy="65" rx="55" ry="22" fill="white" opacity="0.8" />
  <!-- Trees -->
  <rect x="90" y="330" width="12" height="30" fill="#5C3317" />
  <polygon points="96,280 70,340 122,340" fill="#1a5c1a" />
  <rect x="680" y="320" width="12" height="40" fill="#5C3317" />
  <polygon points="686,265 658,330 714,330" fill="#1a5c1a" />
  <!-- Label -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.4)" />
  <text x="400" y="487" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle">Nature — Mountain Landscape</text>
</svg>
